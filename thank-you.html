<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Bitcoin Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg { background: linear-gradient(rgba(255,215,0,0.15), rgba(255,223,100,0.25)), url('https://picsum.photos/id/1015/2000/1200') center/cover; background-color: #f8e8b0; }
    .video-container {
      position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
      border-radius: 16px; border: 4px solid #fbbf24;
    }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body class="bg-amber-100 text-gray-900 min-h-screen">

  <section class="hero-bg min-h-screen flex items-center py-12">
    <div class="max-w-3xl mx-auto px-6 text-center">
      <div class="mb-8"><i class="fas fa-check-circle text-green-500 text-8xl"></i></div>
      
      <h1 class="text-5xl font-bold mb-4 text-amber-950">Thank You, <span id="userName" class="text-amber-600"></span>!</h1>
      
      <p class="text-2xl text-amber-800 mb-10">Here's the full presentation you requested:</p>

      <!-- VIMEO VIDEO -->
      <div class="max-w-3xl mx-auto mb-10">
        <div class="video-container shadow-2xl">
          <iframe src="https://player.vimeo.com/video/1188582486" 
                  frameborder="0" 
                  allow="autoplay; fullscreen; picture-in-picture" 
                  allowfullscreen></iframe>
        </div>
      </div>

      <div class="bg-white/90 rounded-3xl p-8 shadow-xl text-left">
        <p class="text-xl font-medium text-amber-900 mb-6">Next Steps:</p>
        <ul class="space-y-4 text-amber-800">
          <li>✅ Check your email for complete details</li>
          <li>✅ Our team may call you shortly</li>
          <li>✅ Secure your spot in the matrix</li>
        </ul>
      </div>
    </div>
  </section>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const firstName = urlParams.get('firstName') || "there";
    document.getElementById('userName').textContent = firstName;
  </script>
</body>
</html>
